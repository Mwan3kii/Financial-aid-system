<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFAMS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>
<body>
    <div class="topbar">
    <div class="topbar-logo">E</div>
    <div><div class="topbar-title">Foreign Student Dashboard</div><div class="topbar-sub">EFAMS — Integrated Financial Aid Management System</div></div>
    <div class="topbar-right"><div class="topbar-user">MW</div></div>
    </div>
  <div class="shell">
    <nav class="sidebar">
      <div class="sidebar-section">Student</div>
      <div class="sidebar-item active">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="1" width="12" height="14" rx="1"/><line x1="5" y1="5" x2="11" y2="5"/><line x1="5" y1="8" x2="11" y2="8"/><line x1="5" y1="11" x2="9" y2="11"/></svg>
        Submit Application
      </div>
      <div class="sidebar-item" onclick="window.location.href='application_status.html'">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="8" cy="8" r="6"/><polyline points="8,5 8,8 10,10"/></svg>
        Application Status
      </div>
      <div class="sidebar-item" onclick="window.location.href='notifications.html'">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 2H3a1 1 0 0 0-1 1v9l3-2h8a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z"/></svg>
        Notifications
      </div>
      <div class="sidebar-spacer"></div>
      <div class="sidebar-item logout">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3"/><polyline points="11,11 14,8 11,5"/><line x1="14" y1="8" x2="6" y2="8"/></svg>
        Logout
      </div>
    </nav>
    <div class="main">
      <div class="page-header">
        <div class="page-title">Submit Financial Aid Application</div>
        <div class="page-title-bar"></div>
      </div>

      <!-- Personal Details -->
      <div class="form-section">
        <div class="form-section-header navy">Applicant Personal Details</div>
        <div class="form-section-body">
          <div class="form-grid form-grid-3" style="margin-bottom:14px">
            <div class="form-group" style="margin-bottom:0"><label class="form-label">First Name</label><input class="form-control" value="Mary"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Middle Name</label><input class="form-control" value="Jane"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Last Name</label><input class="form-control" value="Wambui"></div>
          </div>
          <div class="form-grid form-grid-4" style="margin-bottom:14px">
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Date of Birth</label><input class="form-control" value="15/03/2000"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Gender</label><input class="form-control" value="Female"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Nationality</label><input class="form-control" value="Kenyan"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Marital Status</label><input class="form-control" value="Single"></div>
          </div>
          <div class="form-grid form-grid-4">
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Passport Number</label><input class="form-control" value="A12345678"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Phone Number</label><input class="form-control" value="+254712345678"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Email Address</label><input class="form-control" value="mary@example.com"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Home Address</label><input class="form-control" value="Nairobi, Kenya"></div>
          </div>
        </div>
      </div>

      <!-- Institution Details -->
      <div class="form-section">
        <div class="form-section-header teal">Institution Details</div>
        <div class="form-section-body">
          <div class="form-grid form-grid-4" style="margin-bottom:14px">
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Level of Study</label><input class="form-control" value="Undergraduate"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Institution Name</label><input class="form-control" value="Univ. of Nairobi"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Faculty</label><input class="form-control" value="Engineering"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Admission Number</label><input class="form-control" value="ENG/2022/001"></div>
          </div>
          <div class="form-grid form-grid-4">
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Year of Admission</label><input class="form-control" value="2022"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Expected Completion</label><input class="form-control" value="2026"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Current Year</label><input class="form-control" value="3rd Year"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">GPA / Grade</label><input class="form-control" value="3.7 / 4.0"></div>
          </div>
        </div>
      </div>

      <!-- Loan Details -->
      <div class="form-section">
        <div class="form-section-header gold">Loan Details</div>
        <div class="form-section-body">
          <div class="form-grid form-grid-3" style="margin-bottom:14px">
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Loan Amount Requested (KES)</label><input class="form-control" value="250,000"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Purpose of Loan</label><input class="form-control" value="Tuition &amp; Living Expenses"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Estimated Total Cost (KES)</label><input class="form-control" value="320,000"></div>
          </div>
          <div class="form-grid form-grid-4">
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Bank Name</label><input class="form-control" value="Equity Bank"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Account Number</label><input class="form-control" value="0123456789"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Branch</label><input class="form-control" value="Nairobi CBD"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Supporting Notes</label><input class="form-control" value="See attached docs"></div>
          </div>
        </div>
      </div>

      <div style="display:flex;justify-content:center;gap:14px;padding:10px 0 24px">
        <button class="btn btn-ghost btn-lg">Save as Draft</button>
        <button class="btn btn-navy btn-lg">Submit Application →</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
