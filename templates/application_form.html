<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFAMS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</head>
<body>
    <div class="topbar">
    <div class="topbar-logo">E</div>
    <div><div class="topbar-title">Foreign Student Dashboard</div><div class="topbar-sub">EFAMS — Integrated Financial Aid Management System</div></div>
    <div class="topbar-right"><div class="topbar-user">MW</div></div>
    </div>
  <div class="shell">
    <nav class="sidebar">
      <div class="sidebar-section">Student</div>
      <div class="sidebar-item active">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="1" width="12" height="14" rx="1"/><line x1="5" y1="5" x2="11" y2="5"/><line x1="5" y1="8" x2="11" y2="8"/><line x1="5" y1="11" x2="9" y2="11"/></svg>
        Submit Application
      </div>
      <a href="{{ url_for('status') }}" class="sidebar-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="8" cy="8" r="6"/><polyline points="8,5 8,8 10,10"/></svg>
        Application Status
      </a>
      <a href="{{ url_for('student_notifications') }}" class="sidebar-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 2H3a1 1 0 0 0-1 1v9l3-2h8a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z"/></svg>
        Notifications
      </a>
      <div class="sidebar-spacer"></div>
      <div class="sidebar-item logout">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3"/><polyline points="11,11 14,8 11,5"/><line x1="14" y1="8" x2="6" y2="8"/></svg>
        Logout
      </div>
    </nav>
    <div class="main">
      <div class="page-header">
        <div class="page-title">Submit Financial Aid Application</div>
        <div class="page-title-bar"></div>
      </div>

      <form method="POST" action="{{ url_for('student.submit_application') }}" enctype="multipart/form-data">

      <!-- Personal Details -->
      <div class="form-section">
        <div class="form-section-header navy">Applicant Personal Details</div>
        <div class="form-section-body">
          <div class="form-grid form-grid-3" style="margin-bottom:14px">
            <div class="form-group" style="margin-bottom:0"><label class="form-label">First Name</label><input class="form-control" name="first_name" value=""></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Middle Name</label><input class="form-control" name="middle_name" value=""></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Last Name</label><input class="form-control" name="last_name" value=""></div>
          </div>
          <div class="form-grid form-grid-4" style="margin-bottom:14px">
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Date of Birth</label><input class="form-control" name="date_of_birth" type="date" value=""></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Gender</label><select class="form-control" name="gender"><option value="">Select</option><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option></select></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Nationality</label><input class="form-control" name="nationality" value=""></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Marital Status</label><select class="form-control" name="marital_status"><option value="">Select</option><option value="Single">Single</option><option value="Married">Married</option><option value="Divorced">Divorced</option><option value="Widowed">Widowed</option></select></div>
          </div>
          <div class="form-grid form-grid-4">
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Passport Number</label><input class="form-control" name="passport_number" value=""></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Phone Number</label><input class="form-control" name="phone_number" value=""></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Email Address</label><input class="form-control" name="email" value=""></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Home Address</label><input class="form-control" name="home_address" value=""></div>
          </div>
        </div>
      </div>

      <!-- Institution Details -->
      <div class="form-section">
        <div class="form-section-header teal">Institution Details</div>
        <div class="form-section-body">
          <div class="form-grid form-grid-4" style="margin-bottom:14px">
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Level of Study</label><select class="form-control" name="level_of_study"><option value="">Select</option><option value="Undergraduate">Undergraduate</option><option value="Masters">Masters</option><option value="PhD">PhD</option></select></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Institution Name</label><input class="form-control" name="institution_name" value=""></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Faculty</label><input class="form-control" name="faculty" value=""></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Admission Number</label><input class="form-control" name="admission_number" value=""></div>
          </div>
          <div class="form-grid form-grid-4">
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Year of Admission</label><input class="form-control" name="year_of_admission" type="number" value=""></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Expected Completion</label><input class="form-control" name="expected_completion" type="number" value=""></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Current Year</label><input class="form-control" name="current_year" value=""></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">GPA / Grade</label><input class="form-control" name="gpa" value=""></div>
          </div>
        </div>
      </div>

      <!-- Loan Details -->
      <div class="form-section">
        <div class="form-section-header gold">Loan Details</div>
        <div class="form-section-body">
          <div class="form-grid form-grid-3" style="margin-bottom:14px">
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Loan Amount Requested (KES)</label><input class="form-control" name="loan_amount" value=""></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Purpose of Loan</label><input class="form-control" name="purpose" value=""></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Estimated Total Cost (KES)</label><input class="form-control" name="estimated_total_cost" value=""></div>
          </div>
          <div class="form-grid form-grid-4">
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Bank Name</label><input class="form-control" name="bank_name" value=""></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Account Number</label><input class="form-control" name="account_number" value=""></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Branch</label><input class="form-control" name="branch" value=""></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Supporting Notes</label><input class="form-control" name="supporting_notes" value=""></div>
          </div>
        </div>
      </div>

      <!-- Documents -->
      <div class="form-section">
        <div class="form-section-header purple">Required Documents</div>
        <div class="form-section-body">
          <div class="form-grid form-grid-2">
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Passport Copy</label><input class="form-control" type="file" name="passport" accept=".pdf,.jpg,.png"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Academic Transcript</label><input class="form-control" type="file" name="transcript" accept=".pdf,.jpg,.png"></div>
          </div>
          <div class="form-grid form-grid-2">
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Admission Letter</label><input class="form-control" type="file" name="admission" accept=".pdf,.jpg,.png"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Bank Statement</label><input class="form-control" type="file" name="bank_stmt" accept=".pdf,.jpg,.png"></div>
          </div>
          <div class="form-grid form-grid-2">
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Medical Certificate (Optional)</label><input class="form-control" type="file" name="medical" accept=".pdf,.jpg,.png"></div>
            <div class="form-group" style="margin-bottom:0"><label class="form-label">Other Documents</label><input class="form-control" type="file" name="other" accept=".pdf,.jpg,.png"></div>
          </div>
        </div>
      </div>

      </form>

      <div style="display:flex;justify-content:center;gap:14px;padding:10px 0 24px">
        <button type="submit" class="btn btn-navy btn-lg">Submit Application →</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
